<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorx</title>
    <link rel="stylesheet" href="Desarrollo\css\Colorxprinc.css">
</head>

<body>
    <header>
        <h1>Colorx</h1>
        <h2>Genera tu vision.</h2>
    </header>
    <main>
            <h1>Proyecto: Color Dominal.</h1>
            <p>Este es el lugar donde descubres tu color.</p>
    </main>
    <form class ="formulario">
        <label>Cantidad de colores:</label> 
            <select id="cantidad">
                <option value="6">6</option>
                <option value="8">8</option>
                <option value="9">9</option>
            </select>
        <label>Formato del color:</label>
            <select id="formatoColor">
                <option value="hex">HEX</option>
                <option value="rgb">RGB</option>
            </select>
            <button type="button" onclick="crearColores()">Generar paleta</button>
            <div id="contenedorColores"></div>        
    </form>
    <div id="toastFeedback" class="toast-feedback" aria-live="polite" aria-atomic="true"></div>
    <script src="Desarrollo\JS\colorxprinc.js"></script>
</body>
</html>
